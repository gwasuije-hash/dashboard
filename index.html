<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 대시보드</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#0a0e1a;
  color:#fff;
  font-family:'Malgun Gothic','Segoe UI',sans-serif;
}

/* ===== HEADER ===== */
#dash-header{
  padding:20px;
}

.dh-title{
  font-size:20px;
  font-weight:800;
  line-height:1.4;
}

/* ===== KPI ===== */
.kpi-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  padding:20px;
}

.kpi{
  background:#131a2a;
  padding:16px;
  border-radius:10px;
}

.kpi-val{
  font-size:24px;
  font-weight:800;
}

/* ===== CARD ===== */
.card{
  background:#131a2a;
  margin:20px;
  padding:16px;
  border-radius:10px;
}

/* ===================== */
/* 🔥 모바일 최적화 */
/* ===================== */
@media (max-width:768px){

  #dash-header{
    padding:14px;
  }

  .dh-title{
    font-size:18px;
  }

  /* KPI 세로 */
  .kpi-row{
    grid-template-columns:1fr;
    padding:14px;
  }

  .kpi-val{
    font-size:26px;
  }

  .card{
    margin:14px;
  }

  canvas{
    width:100% !important;
    height:220px !important;
  }
}
</style>
</head>

<body>

<div id="dash-header">
  <div class="dh-title">
    26년 1분기 매출현황 — 통합 경영 대시보드
  </div>
</div>

<div class="kpi-row">
  <div class="kpi"><div>전체 매출</div><div class="kpi-val">222억</div></div>
  <div class="kpi"><div>조은장터</div><div class="kpi-val">178억</div></div>
  <div class="kpi"><div>케이푸드</div><div class="kpi-val">44억</div></div>
  <div class="kpi"><div>감소</div><div class="kpi-val">-63억</div></div>
  <div class="kpi"><div>성장</div><div class="kpi-val">+51%</div></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{
    labels:['조은장터','케이푸드'],
    datasets:[
      {label:'25년',data:[219,67], backgroundColor:'#4fc3f7'},
      {label:'26년',data:[178,44], backgroundColor:'#ff7043'}
    ]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{labels:{color:'#fff'}}
    },
    scales:{
      x:{ticks:{color:'#fff'}},
      y:{ticks:{color:'#fff'}}
    }
  }
});
</script>

</body>
</html>
