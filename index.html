<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 대시보드</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9e9e9a;
    --accent: #1a1a2e;
    --green: #1a9e6a; --green-bg: #eaf3de; --green-text: #3b6d11;
    --blue: #185fa5;  --blue-bg:  #e6f1fb; --blue-text:  #185fa5;
    --amber: #854f0b; --amber-bg: #faeeda; --amber-text: #854f0b;
    --red: #a32d2d;   --red-bg:   #fcebeb; --red-text:   #a32d2d;
    --purple: #534ab7;
    --radius: 10px; --radius-sm: 7px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Layout ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 200px; background: var(--accent); padding: 28px 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 16px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; }
  .sidebar-logo img { width: 100%; max-width: 130px; display: block; margin: 0 auto; border-radius: 6px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 10px 20px; font-size: 13px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .nav-item.active { color: #fff; border-left-color: #6c7fff; background: rgba(255,255,255,0.08); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; flex-shrink: 0; }
  .main { margin-left: 200px; padding: 32px; flex: 1; max-width: 960px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── Header ── */
  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .page-title { font-size: 20px; font-weight: 600; color: var(--text); }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { background: var(--surface2); color: var(--text); }
  .refresh-btn svg { width: 13px; height: 13px; }

  /* ── Metric grid ── */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.03em; }
  .metric-value { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric-change { font-size: 11px; margin-top: 6px; }
  .up { color: var(--green); } .dn { color: var(--red); } .neu { color: var(--text3); }

  /* ── Cards ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; }
  .card.full { grid-column: 1 / -1; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

  /* ── Table rows ── */
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row-label { color: var(--text2); }
  .row-val { font-weight: 500; }

  /* ── Badge ── */
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
  .b-green  { background: var(--green-bg);  color: var(--green-text); }
  .b-blue   { background: var(--blue-bg);   color: var(--blue-text); }
  .b-amber  { background: var(--amber-bg);  color: var(--amber-text); }
  .b-red    { background: var(--red-bg);    color: var(--red-text); }
  .b-gray   { background: var(--surface2);  color: var(--text2); }

  /* ── Progress ── */
  .prog-item { margin-bottom: 13px; }
  .prog-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .prog-name { font-weight: 500; }
  .prog-pct { color: var(--text2); }
  .bar-bg { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }

  /* ── Checklist ── */
  .checklist { list-style: none; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .check-item:last-child { border-bottom: none; }
  .chk { width: 17px; height: 17px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .chk-done { background: var(--green); }
  .chk-done::after { content:''; width:5px; height:8px; border-right:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(40deg) translate(-1px,-1px); display:block; }
  .chk-todo { background: var(--surface2); border: 1px solid var(--border2); }
  .text-done { color: var(--text3); text-decoration: line-through; }

  /* ── File item ── */
  .file-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .file-item:last-child { border-bottom: none; }
  .file-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .fi-pdf { background: var(--red-bg); color: var(--red-text); }
  .fi-ppt { background: var(--amber-bg); color: var(--amber-text); }
  .fi-xls { background: var(--green-bg); color: var(--green-text); }
  .fi-img { background: var(--blue-bg); color: var(--blue-text); }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .file-date { font-size: 11px; color: var(--text3); flex-shrink: 0; }

  /* ── Timeline ── */
  .tl-item { display: flex; gap: 12px; padding-bottom: 14px; position: relative; }
  .tl-item:not(:last-child)::before { content:''; position:absolute; left:6px; top:16px; width:1px; height:calc(100% - 8px); background:var(--border2); }
  .tl-dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; margin-top:3px; }
  .tl-title { font-size:13px; font-weight:500; }
  .tl-date { font-size:11px; color:var(--text3); margin-top:3px; }

  /* ── Region cards ── */
  .region-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .region-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; }
  .region-name { font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
  .region-val { font-size: 17px; font-weight: 600; }
  .region-chg { font-size: 11px; margin-top: 4px; }

  /* ── Loading / Error ── */
  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text2); gap: 12px; }
  .state-msg svg { width: 32px; height: 32px; opacity: 0.3; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Config banner ── */
  .config-banner { background: #faeeda; border: 1px solid #f0c97a; border-radius: var(--radius); padding: 14px 18px; margin-bottom: 24px; font-size: 13px; color: #5a3a00; display: flex; align-items: flex-start; gap: 10px; }
  .config-banner code { background: rgba(0,0,0,0.07); padding: 1px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
</style>
</head>

<script>
// ============================================================
//  ★ 여기에 Apps Script 웹앱 URL을 붙여넣으세요 ★
// ============================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwINKV3hKUeL_d7Bm50di44Vc6R6svRrAKUL8GZqGTm7lBi_zpcyrz7EZ4RRPn76Q_Iaw/exec";
// ============================================================

let cachedData = null;

// ── Navigation ──
function show(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  el.classList.add('active');
}

// ── Helpers ──
function badge(status) {
  const map = { '완료':'b-green','준비완료':'b-green','상승':'b-green', '진행중':'b-blue','자료 작성중':'b-blue', '검토중':'b-amber','준비중':'b-amber', '지연':'b-red','수정중':'b-amber','검수 대기':'b-amber','하락':'b-red' };
  const cls = map[status] || 'b-gray';
  return `<span class="badge ${cls}">${status}</span>`;
}
function dotColor(c) {
  const m = { green:'#1a9e6a', blue:'#185fa5', amber:'#ef9f27', red:'#e24b4a', purple:'#534ab7' };
  return m[c] || '#aaa';
}
function fileIconClass(type) {
  const m = { PDF:'fi-pdf', PPT:'fi-ppt', XLS:'fi-xls', IMG:'fi-img' };
  return m[(type||'').toUpperCase()] || 'fi-img';
}
function loading(msg='데이터를 불러오는 중...') {
  return `<div class="state-msg"><div class="spinner"></div><span>${msg}</span></div>`;
}
function errorMsg(msg) {
  return `<div class="state-msg"><span style="font-size:13px;color:#c94040;">${msg}</span></div>`;
}

// ── Render functions ──
function renderWork(data) {
  if (!data || !data.work) return;
  const tasks = data.work.filter(r => r.name);

  // Metrics
  const total = tasks.length;
  const done = tasks.filter(t => t.status === '완료').length;
  const inprog = tasks.filter(t => t.status === '진행중').length;
  const delayed = tasks.filter(t => t.status === '지연').length;
  document.getElementById('work-metrics').innerHTML = [
    { label:'전체 업무', val: total+'건', chg:'', cls:'neu' },
    { label:'완료', val: done+'건', chg:`완료율 ${total ? Math.round(done/total*100) : 0}%`, cls:'up' },
    { label:'진행 중', val: inprog+'건', chg:'', cls:'neu' },
    { label:'지연', val: delayed+'건', chg: delayed > 0 ? '주의 필요' : '', cls: delayed > 0 ? 'dn' : 'neu' },
  ].map(m => `<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value">${m.val}</div><div class="metric-change ${m.cls}">${m.chg}</div></div>`).join('');

  // Progress by team
  const teams = {};
  tasks.forEach(t => {
    if (!t.team) return;
    if (!teams[t.team]) teams[t.team] = { done: 0, total: 0 };
    teams[t.team].total++;
    if (t.status === '완료') teams[t.team].done++;
  });
  const colors = ['#534ab7','#378add','#1a9e6a','#ef9f27','#e24b4a'];
  let pi = 0;
  document.getElementById('work-progress').innerHTML = Object.entries(teams).map(([name, v]) => {
    const pct = v.total ? Math.round(v.done / v.total * 100) : 0;
    const c = colors[pi++ % colors.length];
    return `<div class="prog-item"><div class="prog-head"><span class="prog-name">${name}</span><span class="prog-pct">${pct}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c};"></div></div></div>`;
  }).join('') || '<p style="color:var(--text3);font-size:13px;">데이터 없음</p>';

  // Task list
  document.getElementById('work-list').innerHTML = tasks.map(t =>
    `<div class="row"><span class="row-label">${t.name}</span>${badge(t.status)}</div>`
  ).join('') || '<p style="color:var(--text3);font-size:13px;">데이터 없음</p>';

  document.getElementById('work-updated').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
}

function renderMgmt(data) {
  if (!data || !data.mgmt) return;
  const rows = data.mgmt.filter(r => r.quarter);
  const latest = rows[rows.length - 1] || {};
  const prev = rows[rows.length - 2] || {};

  const revChg = latest.revenue && prev.revenue ? ((latest.revenue - prev.revenue) / prev.revenue * 100).toFixed(1) : null;
  const metrics = [
    { label:'최근 분기 매출', val: latest.revenue ? latest.revenue + '억' : '-', chg: revChg ? `▲ ${revChg}% QoQ` : '', cls:'up' },
    { label:'영업이익', val: latest.profit ? latest.profit + '억' : '-', chg:'', cls:'neu' },
    { label:'영업이익률', val: latest.margin ? latest.margin + '%' : '-', chg:'', cls:'neu' },
    { label:'신규 고객', val: latest.newCust ? latest.newCust + '명' : '-', chg:'', cls:'up' },
  ];

  document.getElementById('mgmt-content').innerHTML = `
    <div class="metric-grid">${metrics.map(m => `<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value">${m.val}</div><div class="metric-change ${m.cls}">${m.chg}</div></div>`).join('')}</div>
    <div class="card-grid">
      <div class="card"><div class="card-title">분기별 매출</div>${rows.map(r => `<div class="row"><span class="row-label">${r.quarter}</span><span class="row-val">${r.revenue}억</span></div>`).join('')}</div>
      <div class="card"><div class="card-title">분기별 이익률</div>${rows.map(r => `<div class="row"><span class="row-label">${r.quarter}</span><span class="row-val">${r.margin}%</span></div>`).join('')}</div>
    </div>`;
}

function renderBranch(containerId, data) {
  if (!data) return;
  const metrics = (data.metrics || []).filter(r => r.label);
  const issues = (data.issues || []).filter(r => r.title);
  document.getElementById(containerId).innerHTML = `
    <div class="metric-grid">${metrics.map(m => `<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value">${m.value}</div><div class="metric-change up">${m.change || ''}</div></div>`).join('')}</div>
    <div class="card-grid">
      <div class="card"><div class="card-title">이슈 & 특이사항</div><div class="timeline">${issues.map(i => `<div class="tl-item"><div class="tl-dot" style="background:${dotColor(i.color)};"></div><div><div class="tl-title">${i.title}</div><div class="tl-date">${i.date}</div></div></div>`).join('')}</div></div>
    </div>`;
}

function renderMeeting(data) {
  if (!data || !data.meeting) return;
  const m = data.meeting;
  const info = (m.info || []).filter(r => r.label);
  const checks = (m.checklist || []).filter(r => r.text);
  const agenda = (m.agenda || []).filter(r => r.text);
  const doneCount = checks.filter(c => c.done).length;

  document.getElementById('meeting-content').innerHTML = `
    <div class="card-grid">
      <div class="card"><div class="card-title">회의 정보</div>${info.map(r => `<div class="row"><span class="row-label">${r.label}</span><span class="row-val">${r.value}</span></div>`).join('')}</div>
      <div class="card"><div class="card-title">체크리스트 <span style="font-size:11px;color:var(--text3);font-weight:400;">${doneCount}/${checks.length} 완료</span></div><ul class="checklist">${checks.map(c => `<li class="check-item"><div class="chk ${c.done ? 'chk-done' : 'chk-todo'}"></div><span class="${c.done ? 'text-done' : ''}">${c.text}</span></li>`).join('')}</ul></div>
      <div class="card full"><div class="card-title">안건 목록</div>${agenda.map(a => `<div class="row"><span class="row-label">${a.text}</span>${badge(a.status)}</div>`).join('')}</div>
    </div>`;
}

function renderDesign(data) {
  if (!data || !data.design) return;
  const files = data.design.filter(r => r.name);
  document.getElementById('design-content').innerHTML = `
    <div class="card"><div class="card-title">파일 목록</div>${files.map(f => `<div class="file-item"><div class="file-icon ${fileIconClass(f.type)}">${f.type || '?'}</div><div class="file-info"><div class="file-name">${f.name}</div><div class="file-meta">${f.author} · ${f.size}</div></div><div class="file-date">${f.date}</div></div>`).join('')}</div>`;
}

function renderExport(data) {
  if (!data || !data.export) return;
  const { regions, files, timeline } = data.export;
  const r = (regions || []).filter(r => r.name);
  const f = (files || []).filter(f => f.name);
  const t = (timeline || []).filter(t => t.title);

  document.getElementById('export-content').innerHTML = `
    <div class="region-grid">${r.map(rg => `<div class="region-card"><div class="region-name">${rg.name}</div><div class="region-val">${rg.value}</div><div class="region-chg ${rg.up ? 'up' : 'dn'}">${rg.up ? '▲' : '▼'} ${rg.change}</div></div>`).join('')}</div>
    <div class="card-grid">
      <div class="card"><div class="card-title">수출 서류</div>${f.map(fi => `<div class="file-item"><div class="file-icon ${fileIconClass(fi.type)}">${fi.type || '?'}</div><div class="file-info"><div class="file-name">${fi.name}</div><div class="file-meta">${fi.author}</div></div><div class="file-date">${fi.date}</div></div>`).join('')}</div>
      <div class="card"><div class="card-title">수출 일정</div><div class="timeline">${t.map(ti => `<div class="tl-item"><div class="tl-dot" style="background:${dotColor(ti.color)};"></div><div><div class="tl-title">${ti.title}</div><div class="tl-date">${ti.date}</div></div></div>`).join('')}</div></div>
    </div>`;
}

// ── Main data loader ──
async function loadData() {
  if (API_URL === "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
    showConfigBanner();
    renderWithDemoData();
    return;
  }

  // Show spinners
  ['work-metrics','work-progress','work-list','mgmt-content','jeongeup-content','seoul-content','meeting-content','design-content','export-content']
    .forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = loading(); });

  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cachedData = await res.json();
    renderAll(cachedData);
  } catch (e) {
    console.error(e);
    ['mgmt-content','jeongeup-content','seoul-content','meeting-content','design-content','export-content']
      .forEach(id => { const el = document.getElementById(id); if(el) el.innerHTML = errorMsg('데이터를 불러오지 못했습니다. API URL을 확인해주세요.'); });
  }
}

function renderAll(data) {
  renderWork(data);
  renderMgmt(data);
  renderBranch('jeongeup-content', data.jeongeup);
  renderBranch('seoul-content', data.seoul);
  renderMeeting(data);
  renderDesign(data);
  renderExport(data);
}
